repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: ["--branch", "main"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: ["--fix"]
        exclude: "^docs/pitch-deck/"
      - id: ruff-format
        exclude: "^docs/pitch-deck/"

  - repo: local
    hooks:
      - id: mypy
        name: mypy (project src/ — strict + pydantic plugin)
        # Run the project's own mypy (uv env + qa-chatbot/pyproject.toml config) so the hook
        # matches `make typecheck`/CI exactly — avoids stub/plugin/version drift on dep bumps
        # (an isolated mirrors-mypy env lacked the pydantic.mypy plugin and mis-analyzed models).
        entry: uv run --directory qa-chatbot mypy src/
        language: system
        pass_filenames: false
        files: ^qa-chatbot/src/.*\.py$

name: Frontend CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'

jobs:
  quality:
    name: Type Check, Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    # Quarantined: e2e needs a provisioned Supabase test project for browser auth.
    # Flip the RUN_E2E repo variable to 'true' to re-enable.
    # See docs/superpowers/notes/2026-06-03-deferred-work.md
    if: ${{ vars.RUN_E2E == 'true' }}

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: qa_chatbot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install backend dependencies
        run: uv sync --all-extras
        working-directory: qa-chatbot

      - name: Run migrations
        run: uv run alembic upgrade head
        working-directory: qa-chatbot
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/qa_chatbot_test

      - name: Start backend server
        run: uv run uvicorn src.app.main:app --host 0.0.0.0 --port 8000 &
        working-directory: qa-chatbot
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/qa_chatbot_test
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
          SUPABASE_JWT_SECRET: dummy-jwt-secret

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break || sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: npm run test:e2e
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/
